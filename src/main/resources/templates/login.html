<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - EcoWash</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .auth-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        .form-group { margin-bottom: 1rem; }
        input[type="text"], input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: red; font-size: 0.9em; margin-bottom: 1rem; }
        .links { text-align: center; margin-top: 1rem; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>Iniciar Sesión</h2>
    
    <!-- Spring Security envía un parámetro 'error' si las credenciales fallan -->
    <div th:if="${param.error}" class="error">
        Usuario o contraseña incorrectos.
    </div>

    <!-- El action por defecto de Spring Security para el login es POST a /login -->
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Correo:</label>
            <input type="text" id="username" name="username" required />
        </div>
        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required />
        </div>
        <button type="submit">Ingresar</button>
    </form>
    
    <div class="links">
        <p>¿No tienes una cuenta? <a th:href="@{/registro}">Regístrate aquí</a></p>
    </div>
</div>

</body>
</html>
